<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Northeast Auto Solutions</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero-container">

    <img src="hero-dash-image.png" class="hero-image">

    <!-- HOTSPOTS -->

    <div class="hotspot engine"
         onclick="showResponse('engine')">
    </div>

    <div class="hotspot oil"
         onclick="showResponse('oil')">
    </div>

    <div class="hotspot battery"
         onclick="showResponse('battery')">
    </div>

    <div class="hotspot temp"
         onclick="showResponse('temp')">
    </div>

    <!-- RESPONSE PANEL -->

    <div class="response-panel" id="responsePanel">

        <h2>Tap A Dashboard Light</h2>

        <p>
            Instant diagnostic guidance and next steps.
        </p>

        <div class="button-row">

            <a href="tel:3305932277"
               class="action-button call">
               Call Shop
            </a>

            <a href="sms:3305932277"
               class="action-button text">
               Text Shop
            </a>

            <a href="tel:3305932277"
               class="action-button tow">
               Tow Help
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
