<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Northeast Auto Dashboard</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
}

.hero-image {
  width: 100%;
  display: block;
}

.dashboard {
  padding: 22px;
  background: #080808;
}

.dashboard h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 8px;
}

.dashboard p {
  text-align: center;
  color: #ccc;
  margin-bottom: 18px;
}

.light-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  max-width: 700px;
  margin: auto;
}

.light {
  min-height: 120px;
  background: #111;
  border: 2px solid #ffb300;
  border-radius: 16px;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  animation: pulse 1.1s infinite;
}

.light span {
  display: block;
  font-size: 36px;
  margin-bottom: 8px;
}

@keyframes pulse {
  0% { box-shadow: 0 0 6px #ffb300; }
  50% { box-shadow: 0 0 24px #ffb300; }
  100% { box-shadow: 0 0 6px #ffb300; }
}

.response {
  max-width: 700px;
  margin: 22px auto 0;
  padding: 20px;
  background: #111;
  border-left: 6px solid #e22;
  border-radius: 14px;
}

.response h2 {
  color: #ffcc00;
  margin-bottom: 12px;
}

.response p {
  text-align: left;
  color: white;
  line-height: 1.5;
}

.actions {
  display: grid;
  gap: 12px;
  margin-top: 18px;
}

.actions a {
  padding: 16px;
  border-radius: 10px;
  text-align: center;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.call { background: #e22; }
.text { background: #333; }
.tow { background: #cc7a00; }

@media (max-width: 520px) {
  .dashboard h1 { font-size: 24px; }
  .light { font-size: 15px; min-height: 105px; }
}
</style>
</head>

<body>

<img class="hero-image" src="heroimage.png" alt="Northeast Auto Solutions">

<section class="dashboard">
  <h1>What's Your Dash Light Telling You?</h1>
  <p>Tap the warning light that came on.</p>

  <div class="light-grid">
    <button class="light" onclick="showIssue('engine')"><span>⚠️</span>Check Engine</button>
    <button class="light" onclick="showIssue('oil')"><span>🛢️</span>Oil Pressure</button>
    <button class="light" onclick="showIssue('battery')"><span>🔋</span>Battery</button>
    <button class="light" onclick="showIssue('temp')"><span>🌡️</span>Engine Temp</button>
  </div>

  <div class="response" id="responseBox">
    <h2>AI Diagnostic Response</h2>
    <p>Tap one of the flashing dashboard lights above for a quick explanation and next step.</p>
  </div>
</section>

<script>
const shopPhone = "3305932277";

const issues = {
  engine: {
    title: "Check Engine Light",
    text: "This usually means the vehicle computer detected an emissions, ignition, fuel, or sensor problem. If the light is steady, short-distance driving may be okay. If it is flashing, stop driving and call for help."
  },
  oil: {
    title: "Oil Pressure Warning",
    text: "This can mean low oil pressure or engine lubrication trouble. Do not keep driving. Low oil pressure can damage the engine quickly."
  },
  battery: {
    title: "Battery Warning",
    text: "This usually points to a battery, alternator, belt, or charging system problem. The vehicle may shut off soon."
  },
  temp: {
    title: "Engine Temperature Warning",
    text: "The engine may be overheating. Pull over safely, shut the vehicle off, and let it cool before continuing."
  }
};

function showIssue(type) {
  const issue = issues[type];

  document.getElementById("responseBox").innerHTML = `
    <h2>${issue.title}</h2>
    <p>${issue.text}</p>

    <div class="actions">
      <a class="call" href="tel:${shopPhone}">Call Northeast Auto</a>
      <a class="text" href="sms:${shopPhone}?body=Hi,%20my%20${encodeURIComponent(issue.title)}%20came%20on.%20Can%20you%20help?">Text the Shop</a>
      <a class="tow" href="tel:${shopPhone}">Call for Tow Help</a>
    </div>
  `;
}
</script>

</body>
</html>
